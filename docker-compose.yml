# Production stack for explorer-experiment.alerce.online
#
#   Internet --443/80--> [caddy] --8000--> [app]
#
# Caddy terminates HTTPS (automatic Let's Encrypt cert + renewal) and reverse
# proxies to the app. The app container is NOT published to the host, so it is
# only reachable through Caddy on the internal compose network.
#
# First run:
#   cp .env.example .env      # then edit values
#   docker compose up -d --build
#
# DNS: an A record for explorer-experiment.alerce.online must point at this
# host's public IP, and the AWS security group must allow inbound 80 + 443,
# BEFORE Caddy can obtain a certificate.

services:
  app:
    build: .
    image: alerce-explorer-experimental:latest
    restart: unless-stopped
    env_file: .env          # API_URL and any future secrets (git-ignored)
    environment:
      # Session-replay analytics (services/analytics.py). Collection is OFF
      # unless ANALYTICS_ENABLED is truthy in .env. Set ANALYTICS_IP_SALT in
      # .env to make the per-IP hashes non-guessable. ANALYTICS_LOG_DIR is left
      # at its default (/app/logs/analytics), which the bind mount below maps
      # onto ./logs/analytics on the host.
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-0}
      ANALYTICS_IP_SALT: ${ANALYTICS_IP_SALT:-}
    expose:
      - "8000"              # internal only — no `ports:`, never hits the host
    volumes:
      # Persist captured sessions in the repo's own ./logs dir on the host (it
      # is both git- and docker-ignored, so nothing is ever committed or baked
      # into the image — only written here at runtime). The container fs is
      # otherwise ephemeral, so without this mount logs vanish on redeploy.
      # One-time on the host before the first `up`, so the non-root appuser
      # (uid 10001) can write:  mkdir -p logs && sudo chown -R 10001:10001 logs
      - ./logs:/app/logs

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"            # HTTP -> auto-redirect to HTTPS + ACME challenge
      - "443:443"
      - "443:443/udp"      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data     # persists issued certificates across restarts
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
