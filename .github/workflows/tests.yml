name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run pytest (upstream ALeRCE calls are monkeypatched)
        run: poetry run pytest -q

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run client-side unit tests (Vitest + jsdom)
        run: npm run test:js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install Python dependencies
        run: poetry install --no-interaction
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # The app is started by Playwright's webServer with the replay transport
      # pointed at the committed fixtures, so the suite runs fully offline.
      - name: Run Playwright E2E tests
        run: poetry run npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
